services:
  postgres:
    image: postgres:16-alpine
    container_name: agentsim-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: agentsim-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  opencode:
    build:
      context: .
      dockerfile: deploy/opencode/Dockerfile
    container_name: agentsim-opencode
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      OPENCODE_CONFIG: /root/.config/opencode/opencode.json
    volumes:
      - ./deploy/opencode/opencode.json:/root/.config/opencode/opencode.json:ro
      - opencode_state:/root/.local/share/opencode
      - opencode_workspace:/workspace
    working_dir: /workspace
    expose:
      - "4096"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$$OPENCODE_SERVER_PASSWORD\" ]; then curl -fsS -u \"$$OPENCODE_SERVER_USERNAME:$$OPENCODE_SERVER_PASSWORD\" http://127.0.0.1:4096/global/health >/dev/null; else curl -fsS http://127.0.0.1:4096/global/health >/dev/null; fi",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentsim-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opencode:
        condition: service_healthy
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3000:3000"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

volumes:
  postgres_data:
  redis_data:
  opencode_state:
  opencode_workspace:
